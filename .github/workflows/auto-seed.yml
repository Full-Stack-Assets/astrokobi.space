name: Auto Seed (push trigger)

# Runs when .github/triggers/seed-30 is pushed to main. Used when the
# automation token cannot call workflow_dispatch. Removes the trigger file
# after a successful run so it only fires once.
on:
  push:
    branches: [main]
    paths: ['.github/triggers/seed-30']

concurrency:
  group: seed-backfill
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  seed:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Verify required secrets
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
        run: |
          if [ -z "${GROQ_API_KEY}" ]; then
            echo "GROQ_API_KEY is not set. Add it in Settings → Secrets and variables → Actions." >&2
            exit 1
          fi
          if [ -z "${BRAVE_API_KEY}" ]; then
            echo "::warning::BRAVE_API_KEY is not set — seed will use Wikipedia fallback for research."
          fi

      - name: Run seed (30 topics)
        env:
          NEXT_PUBLIC_SITE_VARIANT: astrokobi-space
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: npx tsx scripts/seed.ts --limit=30 --interval-hours=24 --delay=2000

      - name: Commit and push
        env:
          VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
          PRODUCTION_BRANCH: main
        run: |
          git config user.name "astrokobi-bot"
          git config user.email "bot@astrokobi.com"
          git config merge.topiclog.name "union topic log entries"
          git config merge.topiclog.driver "node scripts/merge-topic-log.mjs %O %A %B"

          rm -f .github/triggers/seed-30
          git add content/ .github/triggers/
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          count=$(git diff --cached --name-only --diff-filter=A -- 'content/editorial/*.mdx' | wc -l | tr -d ' ')
          git commit -m "seed: backfill ${count} evergreen post(s) [auto-trigger]"

          branch="${GITHUB_REF_NAME:-main}"
          for attempt in 1 2 3 4 5; do
            if git push origin "HEAD:${branch}"; then
              echo "Pushed on attempt ${attempt}."
              if [ -n "${VERCEL_DEPLOY_HOOK_URL}" ] && [ "${branch}" = "${PRODUCTION_BRANCH}" ]; then
                curl -fsS -m 30 --retry 3 -X POST "${VERCEL_DEPLOY_HOOK_URL}" >/dev/null \
                  && echo "Vercel redeploy triggered." \
                  || echo "Vercel deploy hook failed (non-fatal)." >&2
              fi
              exit 0
            fi
            echo "Push rejected (attempt ${attempt}); rebasing..."
            git fetch origin "${branch}"
            git rebase "origin/${branch}" || git rebase --abort || true
          done
          exit 1
